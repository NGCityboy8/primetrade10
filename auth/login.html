<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Prime Trade Capitals</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../css/theme.css" rel="stylesheet" />
  <link href="../css/responsive.css" rel="stylesheet" />
  <link href="../css/premium.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <script>
(function(){var k="ptc-theme",s=localStorage.getItem(k),m=window.matchMedia("(prefers-color-scheme: light)").matches,t=s||(m?"light":"dark");document.documentElement.setAttribute("data-theme",t),document.documentElement.style.colorScheme=t})();
  </script>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>
  <div id="site-header"></div>
  <main id="main">
    <div class="auth-wrapper">
      <div class="auth-card">
        <h1>Login</h1>
        <p class="text-muted-ptc mb-4">Access your client portal</p>
        <form id="login-form">
          <div id="login-alert" class="alert-ptc d-none mb-3"></div>
          <div class="mb-3">
            <label class="form-label-ptc auth-label-required">Username</label>
            <div class="auth-input-wrap">
              <span class="auth-input-icon"><i class="bi bi-person"></i></span>
              <input name="username" class="form-control-ptc border-0 shadow-none" autocomplete="username" required placeholder="Enter your username" />
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label-ptc auth-label-required">Password</label>
            <div class="auth-input-wrap">
              <span class="auth-input-icon"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" autocomplete="current-password" required placeholder="Enter your password" />
              <button type="button" class="auth-input-toggle" data-toggle-password aria-label="Show password"><i class="bi bi-eye"></i></button>
            </div>
          </div>
          <button type="submit" class="btn btn-gradient w-100 btn-auth-primary">
            <i class="bi bi-box-arrow-in-right"></i> Log In
          </button>
        </form>
        <p class="mt-3 text-muted-ptc small text-center mb-0">No account? <a href="verify.html">Create account</a> · <a href="forgot-password.html">Forgot password?</a></p>
      </div>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth-store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/auth-pages.js"></script>
</body>
</html>
