<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verification | Prime Trade Capitals</title>
  <link rel="icon" type="image/png" href="../assets/images/logo.png" />
  <link rel="apple-touch-icon" href="../assets/images/logo.png" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../css/theme.css" rel="stylesheet" />
  <link href="../css/responsive.css" rel="stylesheet" />
  <link href="../css/premium.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <script>
(function(){var k="ptc-theme",s=localStorage.getItem(k),m=window.matchMedia("(prefers-color-scheme: light)").matches,t=s||(m?"light":"dark");document.documentElement.setAttribute("data-theme",t),document.documentElement.style.colorScheme=t})();
  </script>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>
  <div id="site-header"></div>
  <main id="main">
    <div class="auth-wrapper">
      <div class="auth-card auth-card-verify">
        <h1>Verification Required</h1>
        <p class="text-muted-ptc mb-0">Please confirm you are not a robot</p>
        <hr class="auth-divider" />
        <p class="text-muted-ptc small text-center mb-4">Please enter the verification code below to continue to registration.</p>
        <form id="verify-form">
          <div id="verify-alert" class="alert-ptc d-none mb-3"></div>
          <label class="form-label-ptc">Verification Code</label>
          <div class="verify-code-box mb-3">
            <span id="verify-code-display">------</span>
          </div>
          <div class="mb-4">
            <label class="form-label-ptc auth-label-required">Enter Code</label>
            <div class="auth-input-wrap">
              <span class="auth-input-icon"><i class="bi bi-key"></i></span>
              <input type="text" name="code" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="off" required placeholder="Enter code" />
            </div>
          </div>
          <button type="submit" class="btn btn-gradient w-100 btn-auth-primary">
            <i class="bi bi-check-circle"></i> Verify Code
          </button>
        </form>
        <p class="auth-footer-note">This verification helps us protect our platform from automated bots.</p>
        <p class="mt-3 text-muted-ptc small text-center mb-0">Have an account? <a href="login.html">Login</a></p>
      </div>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth-store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/auth-pages.js"></script>
</body>
</html>
