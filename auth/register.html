<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Prime Trade Capitals</title>
  <link rel="icon" type="image/png" href="../assets/images/logo.png" />
  <link rel="apple-touch-icon" href="../assets/images/logo.png" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../css/theme.css" rel="stylesheet" />
  <link href="../css/responsive.css" rel="stylesheet" />
  <link href="../css/premium.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <script>
(function(){var k="ptc-theme",s=localStorage.getItem(k),m=window.matchMedia("(prefers-color-scheme: light)").matches,t=s||(m?"light":"dark");document.documentElement.setAttribute("data-theme",t),document.documentElement.style.colorScheme=t})();
  </script>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>
  <div id="site-header"></div>
  <main id="main">
    <div class="auth-wrapper">
      <div class="auth-card auth-card-wide">
        <h1>Create Account</h1>
        <p class="text-muted-ptc mb-4">Join Prime Trade Capitals</p>
        <form id="register-form">
          <div id="register-alert" class="alert-ptc d-none mb-3"></div>

          <div class="mb-3">
            <label class="form-label-ptc auth-label-required">Username</label>
            <div class="auth-input-wrap">
              <span class="auth-input-icon"><i class="bi bi-person"></i></span>
              <input name="username" autocomplete="username" minlength="3" required placeholder="Choose a username" />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label-ptc auth-label-required">Full Name</label>
            <div class="auth-input-wrap">
              <span class="auth-input-icon"><i class="bi bi-person-badge"></i></span>
              <input name="full_name" autocomplete="name" required placeholder="Enter your full name" />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label-ptc auth-label-required">Country</label>
            <div class="auth-input-wrap">
              <span class="auth-input-icon"><i class="bi bi-geo-alt"></i></span>
              <select name="country" required>
                <option value="">Select your country</option>
                <option>United States</option>
                <option>United Kingdom</option>
                <option>Canada</option>
                <option>Australia</option>
                <option>Germany</option>
                <option>France</option>
                <option>Denmark</option>
                <option>Nigeria</option>
                <option>South Africa</option>
                <option>United Arab Emirates</option>
                <option>Other</option>
              </select>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label-ptc auth-label-required">Phone Number</label>
            <div class="auth-input-wrap">
              <span class="auth-input-icon"><i class="bi bi-telephone"></i></span>
              <input name="phone" type="tel" autocomplete="tel" required placeholder="Enter your phone number" />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label-ptc auth-label-required">Password</label>
            <div class="auth-input-wrap">
              <span class="auth-input-icon"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" minlength="6" autocomplete="new-password" required placeholder="Create a password" />
              <button type="button" class="auth-input-toggle" data-toggle-password aria-label="Show password"><i class="bi bi-eye"></i></button>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label-ptc auth-label-required">Confirm Password</label>
            <div class="auth-input-wrap">
              <span class="auth-input-icon"><i class="bi bi-lock-fill"></i></span>
              <input type="password" name="confirm_password" minlength="6" autocomplete="new-password" required placeholder="Confirm password" />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label-ptc auth-label-required">Account Type</label>
            <div class="auth-input-wrap">
              <span class="auth-input-icon"><i class="bi bi-graph-up"></i></span>
              <select name="account_type" required>
                <option value="personal">Personal Trading Account</option>
                <option value="corporate">Corporate Trading Account</option>
                <option value="managed">Managed Account</option>
              </select>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label-ptc">Referral ID <span class="text-muted-ptc">(optional)</span></label>
            <div class="auth-input-wrap">
              <span class="auth-input-icon"><i class="bi bi-people"></i></span>
              <input name="referral_id" placeholder="Enter referral ID if you have one" />
            </div>
          </div>

          <button type="submit" class="btn btn-gradient w-100 btn-auth-primary">
            <i class="bi bi-person-plus"></i> Create Account
          </button>
        </form>
        <p class="mt-3 text-muted-ptc small text-center mb-0">Have an account? <a href="login.html">Login</a></p>
      </div>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth-store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/auth-pages.js"></script>
</body>
</html>
