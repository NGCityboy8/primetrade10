<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Trading Bots | Prime Trade Capitals</title>
  <link rel="icon" type="image/png" href="../assets/images/logo.png" />
  <link rel="apple-touch-icon" href="../assets/images/logo.png" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../css/theme.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <script>
(function(){var k="ptc-theme",s=localStorage.getItem(k),m=window.matchMedia("(prefers-color-scheme: light)").matches,t=s||(m?"light":"dark");document.documentElement.setAttribute("data-theme",t),document.documentElement.style.colorScheme=t})();
  </script>
  <link href="../css/portal.css" rel="stylesheet" />
  <link href="../css/responsive.css" rel="stylesheet" />
  <link href="../css/premium.css" rel="stylesheet" />
</head>
<body class="portal-app portal-ai-page" data-portal-page="ai-bots" data-portal-title="AI Trading Bots" data-portal-subtitle="">
  <a href="#main" class="skip-link">Skip to content</a>
  <div class="portal-app-layout">
    <div id="portal-sidebar"></div>
    <div class="portal-content">
      <div id="portal-topbar"></div>
      <main class="portal-main ai-main" id="main">
        <header class="ai-hero">
          <div class="ai-hero-text">
            <h2 class="ai-title"><i class="bi bi-robot" aria-hidden="true"></i> AI Trading Bots</h2>
            <p class="ai-subtitle">Grow your wealth with auto-trading AI bots — set and forget while algorithms work 24/7.</p>
          </div>
          <div class="ai-balance-pill">
            <span class="ai-balance-pill-icon" aria-hidden="true"><i class="bi bi-wallet2"></i></span>
            <div>
              <span class="ai-balance-label">Your Balance</span>
              <span class="ai-balance-value" id="ai-available-balance">$0.00</span>
            </div>
          </div>
        </header>

        <div class="ai-fund-banner d-none" id="ai-fund-banner" role="status">
          <div class="ai-fund-banner-text">
            <i class="bi bi-info-circle" aria-hidden="true"></i>
            <span id="ai-fund-banner-msg">Your balance is below the minimum bot price.</span>
          </div>
          <a href="deposit.html" class="btn btn-sm btn-gradient">Fund Account</a>
        </div>

        <section aria-label="Trading bots">
          <h3 class="ai-section-title">Trading Bots</h3>
          <div class="ai-bots-grid" id="ai-bots-grid"></div>
        </section>

        <section class="portal-card ai-active-section d-none" id="ai-active-section" aria-label="Your active bots">
          <h3 class="ai-section-title mb-3">Your Active Bots</h3>
          <div class="ai-active-list" id="ai-active-list"></div>
        </section>
      </main>
      <p class="portal-copyright mb-0">All Rights Reserved © Prime Trade Capitals 2026</p>
    </div>
  </div>
  <button type="button" class="portal-chat-fab" aria-label="Chat"><i class="bi bi-chat-dots-fill"></i><span class="chat-badge">1</span></button>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth-store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/portal-shell.js"></script>
  <script src="../js/portal.js"></script>
  <script src="../js/ai-bots-page.js"></script>
</body>
</html>
