<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stocks | Prime Trade Capitals</title>
  <link rel="icon" type="image/png" href="../assets/images/logo.png" />
  <link rel="apple-touch-icon" href="../assets/images/logo.png" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../css/theme.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <script>
(function(){var k="ptc-theme",s=localStorage.getItem(k),m=window.matchMedia("(prefers-color-scheme: light)").matches,t=s||(m?"light":"dark");document.documentElement.setAttribute("data-theme",t),document.documentElement.style.colorScheme=t})();
  </script>
  <link href="../css/portal.css" rel="stylesheet" />
  <link href="../css/responsive.css" rel="stylesheet" />
  <link href="../css/premium.css" rel="stylesheet" />
</head>
<body class="portal-app portal-stocks-page" data-portal-page="stocks" data-portal-title="Stocks" data-portal-subtitle="">
  <a href="#main" class="skip-link">Skip to content</a>
  <div class="portal-app-layout">
    <div id="portal-sidebar"></div>
    <div class="portal-content">
      <div id="portal-topbar"></div>
      <main class="portal-main stocks-main" id="main">
        <header class="stocks-hero">
          <div>
            <h2 class="stocks-title">Purchase Stocks</h2>
            <p class="stocks-subtitle">Live market prices from major US exchanges — refreshed every minute.</p>
          </div>
          <div class="stocks-hero-meta">
            <div class="stocks-balance-pill">
              <span class="stocks-balance-label">Available Balance</span>
              <span class="stocks-balance-value" id="stocks-available-balance">$0.00</span>
            </div>
            <div class="stocks-live-row">
              <span class="stocks-live-pill" id="stocks-live-pill"><span class="stocks-live-dot" aria-hidden="true"></span> Live</span>
              <p class="stocks-updated text-muted-ptc small mb-0" id="stocks-updated">Loading quotes…</p>
            </div>
          </div>
        </header>

        <section aria-label="Stock options">
          <h3 class="stocks-section-title">Live Stock Options</h3>
          <div class="stocks-grid" id="stocks-grid"></div>
        </section>
      </main>
      <p class="portal-copyright mb-0">All Rights Reserved © Prime Trade Capitals 2026</p>
    </div>
  </div>
  <button type="button" class="portal-chat-fab" aria-label="Chat"><i class="bi bi-chat-dots-fill"></i><span class="chat-badge">1</span></button>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth-store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/portal-shell.js"></script>
  <script src="../js/portal.js"></script>
  <script src="../js/stocks-page.js"></script>
</body>
</html>
