<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transaction Records | Prime Trade Capitals</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../css/theme.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <script>
(function(){var k="ptc-theme",s=localStorage.getItem(k),m=window.matchMedia("(prefers-color-scheme: light)").matches,t=s||(m?"light":"dark");document.documentElement.setAttribute("data-theme",t),document.documentElement.style.colorScheme=t})();
  </script>
  <link href="../css/portal.css" rel="stylesheet" />
  <link href="../css/responsive.css" rel="stylesheet" />
  <link href="../css/premium.css" rel="stylesheet" />
</head>
<body class="portal-app portal-tx-page" data-portal-page="transactions" data-portal-title="Transactions" data-portal-subtitle="">
  <a href="#main" class="skip-link">Skip to content</a>
  <div class="portal-app-layout">
    <div id="portal-sidebar"></div>
    <div class="portal-content">
      <div id="portal-topbar"></div>
      <main class="portal-main tx-main" id="main">
        <header class="tx-hero">
          <div class="tx-hero-text">
            <h2 class="tx-title">Transaction Records</h2>
            <p class="tx-subtitle">View all your financial activities</p>
          </div>
          <div class="tx-balance-pill">
            <span class="tx-balance-pill-icon" aria-hidden="true"><i class="bi bi-wallet2"></i></span>
            <div>
              <span class="tx-balance-pill-label">Current Balance</span>
              <span class="tx-balance-pill-value" id="tx-current-balance">$0.00</span>
            </div>
          </div>
        </header>

        <section class="portal-card tx-records-card" aria-label="Transaction records">
          <div class="tx-tabs" role="tablist" aria-label="Transaction type">
            <button type="button" class="tx-tab active" role="tab" aria-selected="true" data-tx-tab="deposits" id="tx-tab-deposits">
              <i class="bi bi-box-arrow-in-down" aria-hidden="true"></i>
              <span>Deposits</span>
            </button>
            <button type="button" class="tx-tab" role="tab" aria-selected="false" data-tx-tab="withdrawals" id="tx-tab-withdrawals">
              <i class="bi bi-box-arrow-up" aria-hidden="true"></i>
              <span>Withdrawals</span>
            </button>
            <button type="button" class="tx-tab" role="tab" aria-selected="false" data-tx-tab="others" id="tx-tab-others">
              <i class="bi bi-arrow-repeat" aria-hidden="true"></i>
              <span>Others</span>
            </button>
          </div>

          <div class="tx-table-head" aria-hidden="true">
            <span>Amount</span>
            <span>Payment Mode</span>
            <span>Status</span>
            <span>Date</span>
          </div>

          <div class="tx-panel" role="tabpanel" id="tx-panel">
            <div class="tx-table-body" id="tx-table-rows"></div>
            <div class="tx-empty d-none" id="tx-empty">
              <div class="tx-empty-icon"><i class="bi bi-inbox"></i></div>
              <p class="tx-empty-title" id="tx-empty-title">No deposits found</p>
              <p class="tx-empty-hint" id="tx-empty-hint">Your deposit history will appear here</p>
            </div>
          </div>
        </section>
      </main>
      <p class="portal-copyright mb-0">All Rights Reserved © Prime Trade Capitals 2026</p>
    </div>
  </div>
  <button type="button" class="portal-chat-fab" aria-label="Chat"><i class="bi bi-chat-dots-fill"></i><span class="chat-badge">1</span></button>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth-store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/portal-shell.js"></script>
  <script src="../js/portal.js"></script>
  <script src="../js/transactions-page.js"></script>
</body>
</html>
