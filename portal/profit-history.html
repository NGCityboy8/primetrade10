<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profit History | Prime Trade Capitals</title>
  <link rel="icon" type="image/png" href="../assets/images/logo.png" />
  <link rel="apple-touch-icon" href="../assets/images/logo.png" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../css/theme.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <script>
(function(){var k="ptc-theme",s=localStorage.getItem(k),m=window.matchMedia("(prefers-color-scheme: light)").matches,t=s||(m?"light":"dark");document.documentElement.setAttribute("data-theme",t),document.documentElement.style.colorScheme=t})();
  </script>
  <link href="../css/portal.css" rel="stylesheet" />
  <link href="../css/responsive.css" rel="stylesheet" />
  <link href="../css/premium.css" rel="stylesheet" />
</head>
<body class="portal-app portal-roi-page" data-portal-page="profit-history" data-portal-title="Profit History" data-portal-subtitle="">
  <a href="#main" class="skip-link">Skip to content</a>
  <div class="portal-app-layout">
    <div id="portal-sidebar"></div>
    <div class="portal-content">
      <div id="portal-topbar"></div>
      <main class="portal-main roi-main" id="main">
        <header class="roi-hero">
          <h2 class="roi-title"><i class="bi bi-arrow-repeat" aria-hidden="true"></i> Your ROI History</h2>
        </header>

        <div class="roi-summary-grid" aria-label="ROI summary">
          <div class="roi-summary-card">
            <span class="roi-summary-icon roi-summary-icon-blue" aria-hidden="true"><i class="bi bi-currency-dollar"></i></span>
            <div class="roi-summary-body">
              <span class="roi-summary-label">Total Returns</span>
              <span class="roi-summary-value" id="roi-total-returns">$0.00</span>
            </div>
          </div>
          <div class="roi-summary-card">
            <span class="roi-summary-icon roi-summary-icon-green" aria-hidden="true"><i class="bi bi-box-arrow-in-down"></i></span>
            <div class="roi-summary-body">
              <span class="roi-summary-label">Last Return</span>
              <span class="roi-summary-value" id="roi-last-return">$0.00</span>
              <span class="roi-summary-hint" id="roi-last-hint">No returns yet</span>
            </div>
          </div>
          <div class="roi-summary-card">
            <span class="roi-summary-icon roi-summary-icon-blue" aria-hidden="true"><i class="bi bi-box"></i></span>
            <div class="roi-summary-body">
              <span class="roi-summary-label">Total Transactions</span>
              <span class="roi-summary-value" id="roi-tx-count">0</span>
              <span class="roi-summary-hint">ROI payments received</span>
            </div>
          </div>
        </div>

        <section class="portal-card roi-records-card" aria-label="Return on investment history">
          <h3 class="roi-section-title"><i class="bi bi-box" aria-hidden="true"></i> Return on Investment History</h3>

          <div class="roi-table-head" aria-hidden="true">
            <span>Investment Plan</span>
            <span>Amount</span>
            <span>Type</span>
            <span>Date</span>
          </div>

          <div class="roi-panel">
            <div class="roi-table-body" id="roi-table-rows"></div>
            <div class="roi-empty" id="roi-empty">
              <div class="roi-empty-icon" aria-hidden="true"><i class="bi bi-hexagon"></i></div>
              <p class="roi-empty-title">No ROI history found.</p>
            </div>
          </div>
        </section>
      </main>
      <p class="portal-copyright mb-0">All Rights Reserved © Prime Trade Capitals 2026</p>
    </div>
  </div>
  <button type="button" class="portal-chat-fab" aria-label="Chat"><i class="bi bi-chat-dots-fill"></i><span class="chat-badge">1</span></button>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth-store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/portal-shell.js"></script>
  <script src="../js/portal.js"></script>
  <script src="../js/profit-history-page.js"></script>
</body>
</html>
